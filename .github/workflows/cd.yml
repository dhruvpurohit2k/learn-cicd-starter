name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build Image
        run: ./scripts/buildprod.sh

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"

      - name: "Push image to GC"
        run: "gcloud builds submit --tag us-central1-docker.pkg.dev/fluent-opus-495616-q8/notely-ar-repo/notely:latest ."
